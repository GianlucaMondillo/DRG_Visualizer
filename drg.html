<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizzatore DRG v24 - Confronto Pesi</title>
<style>
  :root {
    --bg-0: #06090c;
    --bg-1: #0b1014;
    --bg-2: #0f1620;
    --bg-3: #141d2a;
    --line: #1f2d3f;
    --line-bright: #2a3d56;
    --txt: #c8d4e0;
    --txt-dim: #6a7d92;
    --txt-faint: #455769;
    --neon: #00ff9c;
    --neon-dim: #00b870;
    --cyan: #5ce1e6;
    --amber: #ffb000;
    --magenta: #ff2e8e;
    --red: #ff3b3b;
    --mono: "JetBrains Mono", "Fira Code", "Consolas", "Monaco", "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    margin: 0;
    background:
      radial-gradient(circle at 20% 0%, rgba(0,255,156,.06), transparent 50%),
      radial-gradient(circle at 90% 100%, rgba(92,225,230,.05), transparent 50%),
      var(--bg-0);
    color: var(--txt);
    font-size: 13px;
    line-height: 1.45;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,.012) 3px,
      transparent 4px
    );
    z-index: 1000;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.55) 100%);
    z-index: 1001;
  }
  header {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    border-bottom: 1px solid var(--line);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }
  header::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: .5;
  }
  .logo {
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon-dim);
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 14px;
    border: 1px solid var(--neon-dim);
    padding: 4px 10px;
    border-radius: 2px;
    background: rgba(0,255,156,.05);
  }
  header h1 {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--txt);
    flex: 1;
  }
  header h1 .accent { color: var(--cyan); }
  .stats-bar {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--txt-dim);
  }
  .stat .k { color: var(--txt-faint); margin-right: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .stat .v { color: var(--cyan); font-weight: 700; }
  .stat .v.online { color: var(--neon); }
  .stat .v.online::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--neon);
    border-radius: 50%;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--neon);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    height: calc(100vh - 47px);
  }
  .panel {
    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .panel::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 12px; height: 12px;
    border-top: 1px solid var(--neon);
    border-left: 1px solid var(--neon);
  }
  .panel::after {
    content: "";
    position: absolute;
    bottom: 0; right: 0;
    width: 12px; height: 12px;
    border-bottom: 1px solid var(--neon);
    border-right: 1px solid var(--neon);
  }
  .panel h2 {
    margin: 0;
    padding: 8px 14px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--neon);
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-shadow: 0 0 8px rgba(0,255,156,.4);
  }
  .panel h2 .title-tag::before { content: "> "; color: var(--cyan); }
  .panel h2 .count {
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--line-bright);
    padding: 2px 8px;
    font-size: 10px;
    letter-spacing: 1px;
    font-family: var(--mono);
  }
  .search-box {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--bg-1);
  }
  .input-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .input-wrap::before {
    content: ">";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--neon);
    font-weight: 700;
    pointer-events: none;
    text-shadow: 0 0 6px var(--neon-dim);
  }
  .search-box input[type="text"] {
    width: 100%;
    padding: 9px 12px 9px 26px;
    background: var(--bg-0);
    border: 1px solid var(--line-bright);
    color: var(--neon);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    caret-color: var(--neon);
    text-shadow: 0 0 5px var(--neon-dim);
  }
  .search-box input[type="text"]::placeholder {
    color: var(--txt-faint);
    text-shadow: none;
  }
  .search-box input[type="text"]:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 1px var(--neon-dim), inset 0 0 12px rgba(0,255,156,.08);
  }
  .search-box select {
    padding: 9px 8px;
    background: var(--bg-0);
    border: 1px solid var(--line-bright);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .search-box select:focus {
    outline: none;
    border-color: var(--cyan);
  }
  .results, .selected {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--line-bright) transparent;
  }
  .results::-webkit-scrollbar, .selected::-webkit-scrollbar { width: 8px; }
  .results::-webkit-scrollbar-track, .selected::-webkit-scrollbar-track { background: var(--bg-0); }
  .results::-webkit-scrollbar-thumb, .selected::-webkit-scrollbar-thumb {
    background: var(--line-bright);
    border: 2px solid var(--bg-0);
  }
  .results::-webkit-scrollbar-thumb:hover { background: var(--neon-dim); }

  .item {
    border: 1px solid var(--line);
    background: var(--bg-1);
    padding: 8px 12px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all .12s ease;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
    border-left: 2px solid var(--line);
  }
  .item:hover {
    border-color: var(--neon-dim);
    border-left-color: var(--neon);
    background: var(--bg-2);
    box-shadow: inset 0 0 14px rgba(0,255,156,.06);
  }
  .item.selected-row {
    border-color: var(--cyan);
    border-left-color: var(--cyan);
    background: rgba(92,225,230,.05);
  }
  .item.selected-row::after {
    content: "[ SEL ]";
    position: absolute;
    top: 4px; right: 6px;
    color: var(--cyan);
    font-size: 9px;
    letter-spacing: 1px;
  }
  .item .info { flex: 1; min-width: 0; }
  .item .code {
    color: var(--neon);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0,255,156,.4);
  }
  .item .desc {
    font-size: 12.5px;
    color: var(--txt);
    margin-top: 3px;
    line-height: 1.45;
  }
  .item .meta {
    font-size: 10px;
    color: var(--txt-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 12px;
    margin-top: 4px;
    display: inline-block;
  }
  .item .meta .label { color: var(--txt-faint); }
  .item .peso {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    color: var(--cyan);
    min-width: 75px;
    text-align: right;
    text-shadow: 0 0 8px rgba(92,225,230,.5);
    letter-spacing: 1px;
  }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    border: 1px solid;
    margin-left: 6px;
  }
  .badge-C { color: var(--magenta); border-color: var(--magenta); background: rgba(255,46,142,.08); }
  .badge-M { color: var(--neon); border-color: var(--neon-dim); background: rgba(0,255,156,.08); }
  .badge-NA { color: var(--txt-dim); border-color: var(--line-bright); background: var(--bg-2); }
  .winner {
    border-color: var(--amber) !important;
    border-left-color: var(--amber) !important;
    background: rgba(255,176,0,.07) !important;
    box-shadow: 0 0 18px rgba(255,176,0,.18), inset 0 0 22px rgba(255,176,0,.05) !important;
    animation: winnerGlow 2.4s ease-in-out infinite;
  }
  @keyframes winnerGlow {
    50% { box-shadow: 0 0 28px rgba(255,176,0,.32), inset 0 0 26px rgba(255,176,0,.09); }
  }
  .winner::before {
    content: "// MAX_PESO //";
    position: absolute;
    top: -8px;
    left: 10px;
    background: var(--bg-0);
    color: var(--amber);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 8px;
    letter-spacing: 2px;
    border: 1px solid var(--amber);
    text-shadow: 0 0 6px var(--amber);
  }
  .winner .peso { color: var(--amber); text-shadow: 0 0 10px rgba(255,176,0,.6); }
  .winner .code { color: var(--amber); text-shadow: 0 0 5px rgba(255,176,0,.5); }

  .empty {
    text-align: center;
    color: var(--txt-faint);
    padding: 40px 16px;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .empty::before { content: "[ "; color: var(--txt-faint); }
  .empty::after { content: " ]"; color: var(--txt-faint); }

  .summary {
    padding: 10px 14px;
    background: var(--bg-2);
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--txt-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    min-height: 38px;
    display: flex;
    align-items: center;
  }
  .summary::before {
    content: "$ ";
    color: var(--neon);
    margin-right: 6px;
    text-shadow: 0 0 5px var(--neon-dim);
  }
  .summary strong {
    color: var(--amber);
    font-weight: 700;
    letter-spacing: 1.5px;
    text-shadow: 0 0 6px rgba(255,176,0,.4);
  }
  .clear-btn {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 2px;
    margin-left: 8px;
    transition: all .15s;
  }
  .clear-btn:hover {
    background: var(--red);
    color: var(--bg-0);
    box-shadow: 0 0 12px rgba(255,59,59,.5);
  }
  .remove-x {
    background: transparent;
    border: 1px solid var(--line-bright);
    color: var(--red);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    width: 22px; height: 22px;
    line-height: 1;
    font-family: var(--mono);
    transition: all .12s;
  }
  .remove-x:hover {
    background: var(--red);
    color: var(--bg-0);
    border-color: var(--red);
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; height: auto; }
    body { overflow: auto; }
  }
</style>
</head>

<header>

<main>

  <section class="panel">

        <button class="clear-btn" id="clearBtn">// purge</button>
      </span>
    </h2>
    <div class="selected" id="selected"></div>
    <div class="summary" id="summary"></div>
  </section>
</main>

function parseDRG(raw) {
  const lines = raw.split('\n');
  const out = [];
  const re = /^(\d{3})\s+(\S+)\s+(\S+)\s+(.+?)\s+(\d+,\d+)\s+(\d+|\*)\s*$/;
  for (const line of lines) {
    const m = line.match(re);
    if (!m) continue;
    out.push({
      code: m[1],
      mdc: m[2],
      tipo: m[3],
      descrizione: m[4].trim(),
      peso: parseFloat(m[5].replace(',', '.')),
      soglia: m[6] === '*' ? null : parseInt(m[6], 10)
    });
  }
  return out;
}

function normalize(s) {
  return s.toLowerCase()
    .replace(/[À-ÿ]/g, c => {
      const map = {
        'à':'a','á':'a','â':'a','ã':'a','ä':'a',
        'è':'e','é':'e','ê':'e','ë':'e',
        'ì':'i','í':'i','î':'i','ï':'i',
        'ò':'o','ó':'o','ô':'o','õ':'o','ö':'o',
        'ù':'u','ú':'u','û':'u','ü':'u',
        'ç':'c','ñ':'n'
      };
      return map[c] || c;
    });
}

const DATA = parseDRG(RAW_DRG_DATA);

const state = {
  query: '',
  tipo: '',
  selected: new Map()
};

const $results = document.getElementById('results');
const $selected = document.getElementById('selected');
const $resultCount = document.getElementById('resultCount');
const $selCount = document.getElementById('selCount');
const $summary = document.getElementById('summary');
const $search = document.getElementById('searchInput');
const $filterTipo = document.getElementById('filterTipo');
const $clearBtn = document.getElementById('clearBtn');
const $dbCount = document.getElementById('dbCount');
const $selStat = document.getElementById('selStat');
$dbCount.textContent = String(DATA.length).padStart(4, '0');

function tipoBadge(tipo) {
  const cls = tipo === 'C' ? 'badge-C' : tipo === 'M' ? 'badge-M' : 'badge-NA';
  return '<span class="badge ' + cls + '">' + tipo + '</span>';
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function filterData() {
  const q = normalize(state.query.trim());
  const tokens = q.split(/\s+/).filter(Boolean);
  const out = DATA.filter(d => {
    if (state.tipo && d.tipo !== state.tipo) return false;
    if (tokens.length === 0) return true;
    const hay = normalize(d.code + ' ' + d.mdc + ' ' + d.tipo + ' ' + d.descrizione);
    return tokens.every(t => hay.includes(t));
  });
  out.sort((a, b) => b.peso - a.peso);
  return out;
}

function renderResults() {
  const filtered = filterData();
  $resultCount.textContent = String(filtered.length).padStart(4, '0');
  if (filtered.length === 0) {
    $results.innerHTML = '<div class="empty">no match // null result</div>';
    return;
  }
  const limit = 200;
  const slice = filtered.slice(0, limit);
  let html = slice.map(d => {
    const sel = state.selected.has(d.code) ? ' selected-row' : '';
    return '<div class="item' + sel + '" data-code="' + d.code + '">' +
      '<div class="info">' +
        '<div><span class="code">DRG ' + d.code + '</span> ' + tipoBadge(d.tipo) + ' <span class="meta">MDC ' + d.mdc + '</span></div>' +
        '<div class="desc">' + escapeHtml(d.descrizione) + '</div>' +
        '<div><span class="meta">Soglia: ' + (d.soglia === null ? 'n.d.' : d.soglia + ' gg') + '</span></div>' +
      '</div>' +
      '<div class="peso">' + d.peso.toFixed(4).replace('.', ',') + '</div>' +
    '</div>';
  }).join('');
  if (filtered.length > limit) {
    html += '<div class="empty">+' + (filtered.length - limit) + ' nodi nascosti // restringi la query</div>';
  }
  $results.innerHTML = html;
}

function renderSelected() {
  $selCount.textContent = String(state.selected.size).padStart(2, '0');
  $selStat.textContent = String(state.selected.size).padStart(2, '0');
  if (state.selected.size === 0) {
    $selected.innerHTML = '<div class="empty">buffer empty // click su un nodo per aggiungerlo al compare</div>';
    $summary.innerHTML = '';
    return;
  }
  const items = Array.from(state.selected.values()).sort((a, b) => b.peso - a.peso);
  const maxPeso = items[0].peso;
  $selected.innerHTML = items.map(d => {
    const winnerCls = d.peso === maxPeso && items.length > 1 ? ' winner' : '';
    return '<div class="item' + winnerCls + '">' +
      '<div class="info">' +
        '<div><span class="code">DRG ' + d.code + '</span> ' + tipoBadge(d.tipo) + ' <span class="meta">MDC ' + d.mdc + '</span></div>' +
        '<div class="desc">' + escapeHtml(d.descrizione) + '</div>' +
        '<div><span class="meta">Soglia: ' + (d.soglia === null ? 'n.d.' : d.soglia + ' gg') + '</span></div>' +
      '</div>' +
      '<div class="peso">' + d.peso.toFixed(4).replace('.', ',') + '</div>' +
      '<button class="remove-x" data-remove="' + d.code + '" title="Rimuovi">x</button>' +
    '</div>';
  }).join('');
  const winner = items[0];
  if (items.length > 1) {
    $summary.innerHTML = 'winner: drg <strong>' + winner.code + '</strong> // peso <strong>' + winner.peso.toFixed(4).replace('.', ',') + '</strong> // ' + items.length + ' nodi confrontati';
  } else {
    $summary.innerHTML = 'awaiting input // seleziona almeno 2 DRG per il confronto';
  }
}

$search.addEventListener('input', e => {
  state.query = e.target.value;
  renderResults();
});

$filterTipo.addEventListener('change', e => {
  state.tipo = e.target.value;
  renderResults();
});

$results.addEventListener('click', e => {
  const item = e.target.closest('.item');
  if (!item || !item.hasAttribute('data-code')) return;
  const code = item.getAttribute('data-code');
  if (state.selected.has(code)) {
    state.selected.delete(code);
  } else {
    const drg = DATA.find(d => d.code === code);
    if (drg) state.selected.set(code, drg);
  }
  renderResults();
  renderSelected();
});

$selected.addEventListener('click', e => {
  const btn = e.target.closest('[data-remove]');
  if (!btn) return;
  e.stopPropagation();
  state.selected.delete(btn.getAttribute('data-remove'));
  renderResults();
  renderSelected();
});

$clearBtn.addEventListener('click', () => {
  state.selected.clear();
  renderResults();
  renderSelected();
});

renderResults();
renderSelected();
</script>
